<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1c2c" />
      <stop offset="50%" stop-color="#21243d" />
      <stop offset="100%" stop-color="#1a1c2c" />
    </linearGradient>
    <linearGradient id="trophy-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FDB931" />
      <stop offset="100%" stop-color="#9E7E1D" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="15" fill="url(#bg-gradient)" />
  <rect width="1200" height="300" rx="15" fill="black" fill-opacity="0.2" />

  <!-- Abstract Decorative Elements -->
  <path d="M100 0L300 300H200L0 0H100Z" fill="white" fill-opacity="0.03" />
  <path d="M1100 300L900 0H1000L1200 300H1100Z" fill="white" fill-opacity="0.03" />
  <circle cx="1050" cy="50" r="80" stroke="white" stroke-opacity="0.02" stroke-width="2" />
  <circle cx="150" cy="250" r="60" stroke="white" stroke-opacity="0.02" stroke-width="2" />

  <!-- Trophy Icon -->
  <g transform="translate(100, 75) scale(1.5)" filter="url(#glow)">
    <path d="M60 20C60 8.9543 51.0457 0 40 0C28.9543 0 20 8.9543 20 20V30H10V40C10 51.0457 18.9543 60 30 60V80H20V90H60V80H50V60C61.0457 60 70 51.0457 70 40V30H60V20ZM30 20C30 14.4772 34.4772 10 40 10C45.5228 10 50 14.4772 50 20V30H30V20ZM60 40C60 45.5228 55.5228 50 50 50H30C24.4772 50 20 45.5228 20 40V40H60V40Z" fill="url(#trophy-gradient)" />
    <circle cx="40" cy="30" r="5" fill="white" fill-opacity="0.3" />
  </g>

  <!-- Text Section -->
  <g transform="translate(280, 150)">
    <text font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-1">
      GITHUB PROFILE <tspan fill="#FFD700">TROPHY</tspan>
    </text>
    <text y="50" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="24" fill="#8b949e">
      Showcase your achievements with dynamic, beautifully crafted trophies.
    </text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="298" rx="14" stroke="white" stroke-opacity="0.1" stroke-width="2" fill="none" />
</svg>
